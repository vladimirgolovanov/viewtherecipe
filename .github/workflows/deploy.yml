name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
            context: .
            file: docker/Dockerfile
            platforms: linux/amd64,linux/arm64
            push: true
            tags: ghcr.io/vladimirgolovanov/viewtherecipe/viewtherecipe:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy manifest to server
        run: |
          scp -i ~/.ssh/id_rsa k8s/deployment.yaml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/projects/viewtherecipe/deployment.yaml

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            kubectl create secret generic viewtherecipe-env \
              --from-env-file=/projects/viewtherecipe/.env \
              -n savetherecipe \
              --dry-run=client -o yaml | kubectl apply -f -
            kubectl apply -f /projects/viewtherecipe/deployment.yaml
            kubectl rollout restart deployment/viewtherecipe -n savetherecipe
          EOF
