nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['.*']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Mcp-Protocol-Version', 'Mcp-Session-Id', 'Last-Event-ID', 'Accept']
        expose_headers: ['Link', 'Mcp-Session-Id']
        max_age: 3600
    paths:
        '^/api/': ~
        '^/mcp': ~
