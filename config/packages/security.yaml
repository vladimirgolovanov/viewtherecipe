security:
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User

    firewalls:
        dev:
            pattern: ^/_(profiler|wdt)
            security: false
        oauth_public:
            pattern: ^/(register|token)
            security: false
        authorize:
            pattern: ^/(authorize|\.well-known)
            stateless: false
            context: main
            custom_authenticators:
                - App\Security\TelegramAuthenticator
            entry_point: App\Security\TelegramEntryPoint
        api:
            pattern: ^/(api)
            stateless: false
            context: main
            custom_authenticators:
                - App\Security\TelegramAuthenticator
                - App\Security\ApiTokenAuthenticator
            entry_point: App\Security\TelegramEntryPoint
        mcp:
            pattern: ^/mcp
            stateless: true
            entry_point: App\Security\OAuthAuthenticator
            custom_authenticators:
                - App\Security\OAuthAuthenticator

    access_control:
        - { path: ^/dev/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/token, roles: PUBLIC_ACCESS }
        - { path: ^/authorize, roles: ROLE_USER }
        - { path: ^/api/auth/telegram, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/mcp, roles: ROLE_USER }
