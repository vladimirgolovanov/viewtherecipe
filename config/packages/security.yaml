security:
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User

    firewalls:
        dev:
            pattern: ^/_(profiler|wdt)
            security: false
        oauth_authorize:
            pattern: ^/authorize
            stateless: false
            custom_authenticators:
                - App\Security\TelegramAuthenticator
            entry_point: App\Security\OAuthEntryPoint
        oauth:
            pattern: ^/(token|\.well-known)
            security: false
        mcp:
            pattern: ^/mcp
            stateless: true
            custom_authenticators:
                - App\Security\OAuth2TokenAuthenticator
            entry_point: App\Security\OAuth2EntryPoint
        api:
            pattern: ^/(api)
            stateless: true
            custom_authenticators:
                - App\Security\TelegramAuthenticator
                - App\Security\ApiTokenAuthenticator
            entry_point: App\Security\TelegramEntryPoint

    access_control:
        - { path: ^/authorize, roles: PUBLIC_ACCESS }
        - { path: ^/token, roles: PUBLIC_ACCESS }
        - { path: ^/\.well-known, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/telegram, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/mcp, roles: ROLE_USER }
