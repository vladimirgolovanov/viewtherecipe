framework:
    messenger:
        failure_transport: failed

        transports:
            recipes:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                serializer: App\Messenger\ExternalJsonMessageSerializer
                retry_strategy:
                    max_retries: 0
                options:
                    queues:
                        savetherecipe: ~

            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queues:
                        savetherecipe_failed: ~

        routing:
            App\Message\RecipeMessage: recipes
